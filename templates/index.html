<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dating App</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            font-family: Arial;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
        }

        .card {
            background: #222;
            border-radius: 20px;
            padding: 15px;
        }

        img {
            width: 100%;
            border-radius: 15px;
        }

        .name {
            font-size: 24px;
            margin-top: 10px;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
        }

        .like {
            background: #ff4d6d;
            color: white;
        }

        .skip {
            background: #444;
            color: white;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330" />
            <div class="name">Анна, 23</div>

            <div class="buttons">
                <button class="skip">❌</button>
                <button class="like">❤️</button>
            </div>
        </div>
    </div>
</body>
</html>
